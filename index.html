<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel Merch — Wear Your Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <meta name="description" content="Excel 2026 Techfest merch store. Limited drop — wear your story, rep your creativity." />
    <!-- Preload critical above-the-fold assets -->
    <link rel="preload" as="image" href="/assets/mannequin-hoodie.webp" />
    <link rel="preload" as="image" href="/assets/excelmerch.webp" />
    <link rel="preload" as="image" href="/assets/dress/dress1.webp" />
    <link rel="preload" as="image" href="/assets/dress/dress2.webp" />
    <link rel="preload" as="image" href="/assets/dress/dress3.webp" />
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #040610;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }
      .splash-ring {
        width: 48px; height: 48px;
        border-radius: 50%;
        border: 2px solid rgba(111,184,255,0.15);
        border-top-color: rgba(111,184,255,0.9);
        animation: spin 0.8s linear infinite;
      }
      .splash-label {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: rgba(111,184,255,0.5);
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Loading splash shown before React mounts -->
    <div id="splash">
      <div class="splash-ring"></div>
      <div class="splash-label">Loading Showroom</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
